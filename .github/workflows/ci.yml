name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: wppoland/workflows/.github/workflows/_php-ci.yml@v1
    with:
      slug: sieve
      has-js: true
      run-i18n: false
      run-playwright: false
      # Plugin Check = wp.org submission gate. Enabled on this polish branch to
      # capture the verdict for the UX/visual pass; it is advisory (non-blocking).
      run-plugin-check: true
